<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#05091F"/>
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40,0L0,0L0,40" fill="none" stroke="#0047FF" stroke-width="0.5" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#g)"/>
  <!-- Transformer schematic -->
  <g transform="translate(400,230)" stroke="#4D8AFF" fill="none" opacity="0.55" stroke-linecap="round">
    <!-- Primary coil -->
    <path d="M-120,0 Q-105,-22 -90,0 Q-75,-22 -60,0 Q-45,-22 -30,0 Q-15,-22 0,0" stroke-width="2.2"/>
    <!-- Core -->
    <line x1="0" y1="-28" x2="0" y2="28" stroke-width="4.5"/>
    <line x1="10" y1="-28" x2="10" y2="28" stroke-width="4.5"/>
    <!-- Secondary coil -->
    <path d="M10,0 Q25,-22 40,0 Q55,-22 70,0 Q85,-22 100,0 Q115,-22 130,0" stroke-width="2.2"/>
    <!-- Terminal leads -->
    <line x1="-120" y1="0" x2="-155" y2="0" stroke-width="1.8"/>
    <line x1="-120" y1="-20" x2="-155" y2="-20" stroke-width="1.8"/>
    <line x1="130" y1="0" x2="165" y2="0" stroke-width="1.8"/>
    <line x1="130" y1="-20" x2="165" y2="-20" stroke-width="1.8"/>
    <!-- H & X labels -->
    <text x="-165" y="-28" fill="#4D8AFF" font-family="monospace" font-size="11" opacity="0.7">H</text>
    <text x="168" y="-28" fill="#4D8AFF" font-family="monospace" font-size="11" opacity="0.7">X</text>
  </g>
  <text x="400" y="318" font-family="'Courier New',monospace" font-size="11" fill="#4D8AFF" opacity="0.38" text-anchor="middle" letter-spacing="5">IMAGE PLACEHOLDER</text>
  <text x="400" y="338" font-family="'Courier New',monospace" font-size="9" fill="#4D8AFF" opacity="0.2" text-anchor="middle" letter-spacing="3">CANDRON ENERGY INC.</text>
</svg>
